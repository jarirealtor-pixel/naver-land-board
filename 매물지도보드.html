<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
:root{--bg:#0f1117;--sf:#1a1d27;--sf2:#242836;--bd:#2e3345;--tx:#e8eaed;--tx2:#9aa0b0;--ac:#4f8cff;--nw:#22c55e;--ch:#f59e0b;--rm:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--sf);border-bottom:1px solid var(--bd)}
.hdr h1{font-size:18px;font-weight:700}.hdr h1 span{color:var(--ac)}
.sb{display:flex;gap:12px;padding:10px 20px;background:var(--sf);border-bottom:1px solid var(--bd);overflow-x:auto}
.sc{background:var(--sf2);border-radius:8px;padding:10px 16px;min-width:120px;text-align:center}
.sc .n{font-size:22px;font-weight:900}.sc .l{font-size:11px;color:var(--tx2);margin-top:2px}
.sc.nw .n{color:var(--nw)}.sc.ch .n{color:var(--ch)}.sc.rm .n{color:var(--rm)}
.mn{display:flex;flex:1;overflow:hidden}
.sd{width:420px;display:flex;flex-direction:column;border-right:1px solid var(--bd);background:var(--sf)}
.ft{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;flex-wrap:wrap;gap:8px}
.ft select{background:var(--sf2);color:var(--tx);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;font-size:13px;font-family:inherit;cursor:pointer}
.fc{width:100%;font-size:12px;color:var(--tx2);margin-top:4px}
.al{flex:1;overflow-y:auto;padding:8px}
.ai{background:var(--sf2);border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer;border-left:4px solid var(--ac);transition:background .15s}
.ai:hover{background:#2d3248}
.ai.confirmed{opacity:.5}.ai.confirmed:hover{opacity:.75}
.ai.active{background:#2d3248;outline:2px solid var(--ac);outline-offset:-2px}
.ai .tr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.ai .pr{font-size:18px;font-weight:900;color:var(--ac)}
.ai .tb{font-size:11px;padding:2px 8px;border-radius:10px;color:#fff}
.ai .dt{font-size:12px;color:var(--tx2);line-height:1.6}
.ai .fe{font-size:12px;color:#7ecfff;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sd2{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.sd2.new{background:var(--nw)}.sd2.changed{background:var(--ch)}.sd2.removed{background:var(--rm)}.sd2.existing{background:var(--ac)}
.mw{flex:1;position:relative}#map{width:100%;height:100%}
.pc{font-family:'Noto Sans KR',sans-serif;min-width:280px}.pc .pp{font-size:20px;font-weight:900;color:#1a73e8}
.pc .pr{font-size:13px;color:#333;margin:3px 0}.pc .pf{font-size:12px;color:#666;margin:6px 0;font-style:italic}
.pc .nb{display:flex;gap:6px;margin-top:10px}
.pc .nb a{flex:1;text-align:center;padding:8px 4px;border-radius:6px;text-decoration:none;font-size:12px;font-weight:700;color:#fff;cursor:pointer}
.nb .nv{background:#03c75a}.nb .kk{background:#fee500;color:#333}.nb .gl{background:#4285f4}
.grp-header{background:var(--bd);border-radius:8px;padding:8px 12px;margin-bottom:4px;cursor:pointer;font-size:12px;color:var(--tx2);display:flex;justify-content:space-between;align-items:center}
.grp-header:hover{background:#3a3f55}
.grp-body{margin-left:16px;border-left:2px dashed var(--bd);padding-left:8px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

// 확인완료 (localStorage)
function getConf(){try{return JSON.parse(localStorage.getItem('confirmed')||'[]')}catch(e){return[]}}
function setConf(a){try{localStorage.setItem('confirmed',JSON.stringify(a))}catch(e){}}
function isConf(no){return getConf().includes(String(no))}
function togConf(no){const c=getConf(),s=String(no),i=c.indexOf(s);if(i>=0)c.splice(i,1);else c.push(s);setConf(c);render()}

// 관심매물 (⭐) — 노션 동기화용
function getWish(){try{return JSON.parse(localStorage.getItem('wishlist')||'[]')}catch(e){return[]}}
function setWish(a){try{localStorage.setItem('wishlist',JSON.stringify(a))}catch(e){}}
function isWish(no){return getWish().includes(String(no))}
function togWish(no){const w=getWish(),s=String(no),i=w.indexOf(s);if(i>=0)w.splice(i,1);else w.push(s);setWish(w);render();updWishCount()}
function updWishCount(){const el=document.getElementById('wishCount');if(el)el.textContent=getWish().length}
function exportWish(){
  const w=getWish();
  if(!w.length){alert('관심매물이 없습니다. 매물 팝업에서 ⭐ 버튼으로 등록하세요.');return}
  const blob=new Blob([JSON.stringify(w,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='관심매물.json';a.click();
  URL.revokeObjectURL(url);
  alert('관심매물.json 다운로드됨.\n박가님 PC 의 네이버부동산크롤링 폴더에 넣고\n노션동기화.bat 를 실행하세요.');
}
function clearWish(){
  if(confirm('모든 관심매물 표시를 지우시겠습니까?\n(노션 DB 는 영향 없음)')){
    setWish([]);render();updWishCount();
  }
}

// GPS 길찾기
function navi(type,dlat,dlng,dn){
  navigator.geolocation.getCurrentPosition(function(p){
    const sl=p.coords.latitude,sg=p.coords.longitude;
    if(type==='naver'){
      // 네이버 route 스킴: slat/slng/sname(출발) + dlat/dlng/dname(도착) + appname 필수
      const u='nmap://route/car?slat='+sl+'&slng='+sg+'&sname='+encodeURIComponent('현재위치')+'&dlat='+dlat+'&dlng='+dlng+'&dname='+encodeURIComponent(dn)+'&appname=jarirealtor-pixel.github.io';
      location.href=u;
      setTimeout(function(){window.open('https://map.naver.com/p/directions/'+sg+','+sl+','+encodeURIComponent('현재위치')+'/'+dlng+','+dlat+','+encodeURIComponent(dn)+'/-/car')},2000);
    }else if(type==='kakao'){
      location.href='kakaomap://route?sp='+sl+','+sg+'&ep='+dlat+','+dlng+'&by=CAR';
      setTimeout(function(){window.open('https://map.kakao.com/link/from/'+encodeURIComponent('현재위치')+','+sl+','+sg+'/to/'+encodeURIComponent(dn)+','+dlat+','+dlng)},2000);
    }else{
      window.open('https://www.google.com/maps/dir/'+sl+','+sg+'/'+dlat+','+dlng);
    }
  },function(){
    // GPS 실패 시: 출발지 없이 도착지만
    if(type==='naver'){
      location.href='nmap://route/car?dlat='+dlat+'&dlng='+dlng+'&dname='+encodeURIComponent(dn)+'&appname=jarirealtor-pixel.github.io';
      setTimeout(function(){window.open('https://map.naver.com/p/directions/-/'+dlng+','+dlat+','+encodeURIComponent(dn)+'/-/car')},2000);
    }else if(type==='kakao')window.open('https://map.kakao.com/link/to/'+encodeURIComponent(dn)+','+dlat+','+dlng);
    else window.open('https://www.google.com/maps/dir/?api=1&destination='+dlat+','+dlng);
  },{enableHighAccuracy:true,timeout:5000});
}

function ic(a){
  const tc=TC[a.type]||TC['기타'],cf=isConf(a.no);
  const rc=a.status==='new'?'#22c55e':a.status==='changed'?'#f59e0b':a.status==='removed'?'#ef4444':'transparent';
  const op=cf||a.status==='removed'?0.4:1,sz=cf?'10px':'14px';
  const rn=rc==='transparent'?'':`box-shadow:0 0 0 3px ${rc},0 1px 4px rgba(0,0,0,.5);`;
  const mk2=cf?`<div style="position:absolute;top:-2px;left:-2px;color:#fff;font-size:14px;font-weight:bold;text-shadow:0 0 3px #000">✓</div>`:'';
  return L.divIcon({className:'',html:`<div style="position:relative;width:18px;height:18px;display:flex;align-items:center;justify-content:center;opacity:${op}"><div style="width:${sz};height:${sz};border-radius:50%;background:${tc};border:2px solid #fff;${rn}"></div>${mk2}</div>`,iconSize:[18,18],iconAnchor:[9,9]});
}
function fmtp(w){if(!w||w<=0)return'-';if(w>=1e8){const e=Math.floor(w/1e8),m=Math.floor(w%1e8/1e4);return m?`${e}억 ${m.toLocaleString()}만`:`${e}억`}return w>=1e4?`${Math.floor(w/1e4).toLocaleString()}만`:`${w.toLocaleString()}원`}

<div class="sc"><div class="n">${fmtp(av)}</div><div class="l">평균가</div></div>
<div class="sc"><div class="n">${regs.length}</div><div class="l">지역</div></div>`}
rs();document.getElementById('meta').textContent=`${new Date().toLocaleString('ko-KR')} · ${D.length}건`;

// 필터 로직
function gf(){let d=[...D];const r=fR.value,t=fT.value,tr=document.getElementById('fTr').value,s=document.getElementById('fS').value,cf=document.getElementById('fConf').value,wf=document.getElementById('fWish').value;
if(r)d=d.filter(a=>a.region===r);if(t)d=d.filter(a=>a.type===t);if(tr)d=d.filter(a=>a.trade===tr);if(s)d=d.filter(a=>a.status===s);
if(cf==='conf')d=d.filter(a=>isConf(a.no));if(cf==='unconf')d=d.filter(a=>!isConf(a.no));
if(wf==='wish')d=d.filter(a=>isWish(a.no));
const o=document.getElementById('fO').value;
switch(o){case'newest':d.sort((a,b)=>(b.firstSeen||'').localeCompare(a.firstSeen||''));break;
case'pH':d.sort((a,b)=>b.deal-a.deal);break;case'pL':d.sort((a,b)=>(a.deal||9e15)-(b.deal||9e15));break;
case'aL':d.sort((a,b)=>(a.land||9e15)-(b.land||9e15));break;case'aH':d.sort((a,b)=>(b.land||0)-(a.land||0));break;
case'lpL':d.sort((a,b)=>(a.lpp||9e15)-(b.lpp||9e15));break;case'lpH':d.sort((a,b)=>(b.lpp||0)-(a.lpp||0));break}return d}

// 중복 그룹핑 (좌표 30m 이내 + 같은 종류)
function grp(items){
  const gs=[],used=new Set();
  for(let i=0;i<items.length;i++){if(used.has(i))continue;
    const a=items[i],g=[a];used.add(i);
    for(let j=i+1;j<items.length;j++){if(used.has(j))continue;
      const b=items[j];
      if(a.type===b.type&&Math.abs(a.lat-b.lat)<0.0003&&Math.abs(a.lon-b.lon)<0.0003){g.push(b);used.add(j)}}
    gs.push(g)}return gs}
function togGrp(id){const e=document.getElementById('g-'+id);if(e)e.style.display=e.style.display==='none'?'block':'none'}

// 리스트 아이템 렌더
function ri(a){
  let li='';if(a.land)li=`대지 ${a.landP}평`;if(a.lppT!=='-')li+=` · ${a.lppT}`;if(a.floor)li+=` / 연${a.floorP}평`;
  const ws=isWish(a.no)?'<span style="color:#eab308;margin-right:4px">⭐</span>':'';
  return `<div class="ai ${a.status} ${isConf(a.no)?'confirmed':''}" id="item-${a.no}" onclick="fo('${a.no}')" style="border-left-color:${TC[a.type]||'#6b7280'}">
<div class="tr"><div class="pr">${ws}${isConf(a.no)?'<span style="color:#16a34a;margin-right:4px">✓</span>':''}<span class="sd2 ${a.status}"></span>${a.dealText}</div><span class="tb" style="background:${TC[a.type]||'#6b7280'}">${a.type}</span></div>
<div class="dt">${li?`📐 ${li}<br>`:''}${a.age!=='-'?`🏗 ${a.age} · `:''}${a.short} · 노출:${a.expose}</div>
${a.feat!=='-'?`<div class="fe">"${a.feat}"</div>`:''}
<div style="font-size:11px;color:var(--tx2);margin-top:2px">${a.broker} · <a href="${a.url}" target="_blank" style="color:#4f8cff" onclick="event.stopPropagation()">상세↗</a></div></div>`}

// 메인 렌더
function render(){const d=gf();document.getElementById('fc').textContent=`${d.length}건 (전체 ${D.length})`;
mg.clearLayers();d.forEach(a=>{if(!a.lat||!a.lon)return;const m=L.marker([a.lat,a.lon],{icon:ic(a)}).bindPopup(pp(a),{maxWidth:320});m._no=a.no;
m.on('click',function(){scrollTo2(a.no)});mg.addLayer(m);mk[a.no]=m});
if(d.length>0&&mg.getLayers().length>0)map.fitBounds(mg.getBounds().pad(0.1));
const ls=document.getElementById('al');
if(!d.length){ls.innerHTML='<div style="padding:40px;text-align:center;color:var(--tx2)">매물 없음</div>';return}
const gs=grp(d);let h='';
gs.forEach((g,i)=>{
  if(g.length===1){h+=ri(g[0])}
  else{
    h+=`<div class="grp-header" onclick="togGrp(${i})"><span>📦 동일매물 ${g.length}건 · ${g[0].dealText} · ${g[0].type} · ${g[0].short}</span><span style="color:var(--ac)">펼치기/접기 ▼</span></div>`;
    h+=ri(g[0]);
    h+=`<div id="g-${i}" class="grp-body" style="display:none">`;
    for(let k=1;k<g.length;k++)h+=ri(g[k]);
    h+='</div>'}});
ls.innerHTML=h}
function fo(no){const m=mk[no];if(m){map.setView(m.getLatLng(),16);m.openPopup();scrollTo2(no)}}
function scrollTo2(no){document.querySelectorAll('.ai.active').forEach(e=>e.classList.remove('active'));
const el=document.getElementById('item-'+no);if(el){el.classList.add('active');el.scrollIntoView({behavior:'smooth',block:'center'})}}
['fR','fT','fTr','fS','fConf','fWish','fO'].forEach(id=>document.getElementById(id).addEventListener('change',render));
updWishCount();
render();
</script></body></html>
